name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$REPO" > /dev/null 2>&1; then
            echo "Release already exists for $TAG"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --repo "$REPO"
            echo "Created release $TAG"
          fi

  build_windows:
    name: Build Windows (installer + backend)
    needs: create_release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Electron (TypeScript)
        run: npm run build:electron

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend onefile (Windows)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pyinstaller
          python -m PyInstaller --onefile --name backend --distpath backend/dist/windows --workpath backend/build/windows --specpath backend/build/windows --paths backend backend/app/main.py
          if (!(Test-Path "backend/dist/windows/backend.exe")) { throw "Expected backend artifact not found" }

      - name: Package Electron app (Windows)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm --workspace electron run dist

      - name: Upload release assets (Windows)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          $version = node -p "require('./package.json').version"
          $installer = "dist/packages/LocalTranscribe-$version-win-x64.exe"
          if (!(Test-Path $installer)) { throw "Installer not found: $installer" }

          gh release upload $env:TAG "$installer" --repo $env:REPO --clobber

  build_macos_arm64:
    name: Build macOS (arm64 dmg)
    needs: create_release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Work around Rollup optional dependency bug
        run: npm install --no-save @rollup/rollup-darwin-arm64@4.59.0

      - name: Work around electron-builder optional DMG dependency bug
        run: npm install --no-save dmg-license

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend onefile (macOS arm64)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pyinstaller
          python -m PyInstaller --onefile --name backend --distpath backend/dist/macos-arm64 --workpath backend/build/macos-arm64 --specpath backend/build/macos-arm64 --paths backend backend/app/main.py
          test -f backend/dist/macos-arm64/backend

      - name: Prepare ffmpeg runtime (macOS arm64)
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            brew install ffmpeg
          fi

          mkdir -p bin/macos-arm64
          cp "$(command -v ffmpeg)" bin/macos-arm64/ffmpeg
          chmod +x bin/macos-arm64/ffmpeg

          if command -v ffprobe >/dev/null 2>&1; then
            cp "$(command -v ffprobe)" bin/macos-arm64/ffprobe
            chmod +x bin/macos-arm64/ffprobe
          fi

          test -f bin/macos-arm64/ffmpeg

      - name: Re-ensure Rollup native module (macOS)
        run: |
          npm install --no-save @rollup/rollup-darwin-arm64@4.59.0
          node -e "require('@rollup/rollup-darwin-arm64')"

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Electron (TypeScript)
        run: npm run build:electron

      - name: Detect signing configuration
        id: mac_signing
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -n "${MAC_CERT_P12_BASE64}" && -n "${MAC_CERT_PASSWORD}" && -n "${APPLE_API_KEY_ID}" && -n "${APPLE_API_ISSUER_ID}" && -n "${APPLE_API_KEY_P8_BASE64}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "macOS signing/notarization: enabled"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "macOS signing/notarization: disabled (missing one or more secrets, building unsigned)"
          fi

      - name: Import Apple signing certificate
        if: steps.mac_signing.outputs.enabled == 'true'
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/macos_signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/macos-signing.keychain-db"

          echo "$MAC_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Prepare App Store Connect API key
        if: steps.mac_signing.outputs.enabled == 'true'
        id: appstore_api
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          echo "path=$API_KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Package Electron app (macOS, signed + notarized)
        if: steps.mac_signing.outputs.enabled == 'true'
        env:
          APPLE_API_KEY: ${{ steps.appstore_api.outputs.path }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: npm --workspace electron run dist

      - name: Package Electron app (macOS, unsigned fallback)
        if: steps.mac_signing.outputs.enabled != 'true'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm --workspace electron run dist

      - name: Upload release assets (macOS)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          version=$(node -p "require('./package.json').version")
          dmg="dist/packages/LocalTranscribe-${version}-mac-arm64.dmg"
          test -f "$dmg"

          gh release upload "$TAG" "$dmg" --repo "$REPO" --clobber
