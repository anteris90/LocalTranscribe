<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .bg{fill:#0b0f12}
      .panel{fill:#071018;stroke:#0f2630;stroke-width:1}
      .accent{fill:#00d27a}
      .muted{fill:#6b808b}
      .text{fill:#cfe8e0;font-family:Consolas,monospace;font-size:14px}
      .title{font-size:20px;fill:#e6fff6}
      .button{fill:#102226;stroke:#083035;stroke-width:1}
      .wave{fill:#07303c}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <rect x="24" y="24" width="1152" height="672" rx="10" class="panel"/>

  <!-- Top bar (terminal feel) -->
  <rect x="40" y="40" width="1120" height="54" rx="6" fill="#071018" stroke="#07262e"/>
  <text x="64" y="74" class="title">LocalTranscribe — Console Mode</text>
  <rect x="1040" y="48" width="120" height="38" rx="6" class="button"/>
  <text x="1060" y="74" class="text">Connect</text>

  <!-- Left sidebar -->
  <rect x="40" y="110" width="260" height="560" rx="8" fill="#07171a" stroke="#083035"/>
  <text x="64" y="140" class="text">Models</text>
  <g transform="translate(64,160)">
    <rect x="0" y="0" width="180" height="36" rx="4" fill="#081e22" stroke="#0b3a33"/>
    <text x="12" y="24" class="text">small (local)</text>
  </g>
  <g transform="translate(64,208)">
    <rect x="0" y="0" width="180" height="36" rx="4" fill="#081e22" stroke="#0b3a33"/>
    <text x="12" y="24" class="text">medium</text>
  </g>
  <g transform="translate(64,256)">
    <rect x="0" y="0" width="180" height="36" rx="4" fill="#081e22" stroke="#0b3a33"/>
    <text x="12" y="24" class="text">large-v3</text>
  </g>

  <!-- Main area: waveform + transcript -->
  <g transform="translate(320,110)">
    <rect x="0" y="0" width="820" height="200" rx="8" fill="#071b20" stroke="#0b3a33"/>
    <text x="18" y="28" class="text">Audio waveform</text>
    <rect x="18" y="44" width="784" height="120" rx="6" class="wave"/>
    <!-- stylized waveform bars -->
    <g fill="#0fbf7a">
      <rect x="36" y="60" width="6" height="80" rx="2"/>
      <rect x="56" y="72" width="6" height="68" rx="2"/>
      <rect x="76" y="50" width="6" height="90" rx="2"/>
      <rect x="96" y="86" width="6" height="54" rx="2"/>
      <rect x="116" y="58" width="6" height="82" rx="2"/>
      <rect x="136" y="70" width="6" height="66" rx="2"/>
      <rect x="156" y="48" width="6" height="88" rx="2"/>
      <rect x="176" y="94" width="6" height="42" rx="2"/>
    </g>
  </g>

  <!-- Right area: transcript and console -->
  <g transform="translate(320,330)">
    <rect x="0" y="0" width="560" height="330" rx="8" fill="#061319" stroke="#083035"/>
    <text x="18" y="28" class="text">Transcript</text>
    <g class="text" transform="translate(18,48)">
      <text y="0">[00:00.00] Speaker 1: Hello — this is an example transcript line.</text>
      <text y="24">[00:05.12] Speaker 2: The console-style UI highlights timestamps and quick actions.</text>
      <text y="48">[00:12.50] Speaker 1: Export as .srt / .txt / .json</text>
    </g>
  </g>

  <g transform="translate(896,330)">
    <rect x="0" y="0" width="244" height="330" rx="8" fill="#071718" stroke="#083035"/>
    <text x="18" y="28" class="text">Runtime console</text>
    <rect x="18" y="44" width="208" height="240" rx="6" fill="#031212"/>
    <text x="26" y="68" class="muted">Preflight: models/small — OK</text>
    <text x="26" y="92" class="muted">ffmpeg: available</text>
    <text x="26" y="116" class="muted">Device: Auto (CUDA)</text>
    <rect x="26" y="304" width="176" height="14" rx="6" fill="#083b31"/>
    <rect x="26" y="304" width="96" height="14" rx="6" class="accent"/>
  </g>

  <!-- Footer controls -->
  <g transform="translate(320,680)">
    <rect x="0" y="0" width="820" height="16" fill="transparent"/>
    <text x="0" y="12" class="muted">Tip: Press <b>Space</b> to play/pause (console-style keyboard shortcuts)</text>
  </g>
</svg>