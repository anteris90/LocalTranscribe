<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .bg{fill:#050607}
      .panel{fill:#061214;stroke:#0b2730}
      .accent{fill:#7ef3b4}
      .mono{font-family:SFMono-Regular,Menlo,monospace;font-size:13px;fill:#bfeeda}
      .muted{fill:#4f6b6a}
      .chip{fill:#071a18;stroke:#0b3a33}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <rect x="36" y="36" width="1128" height="648" rx="12" class="panel"/>

  <!-- Left console column -->
  <g transform="translate(56,56)">
    <rect x="0" y="0" width="320" height="608" rx="8" fill="#06181a" stroke="#083035"/>
    <text x="16" y="28" class="mono">Quick Actions</text>
    <g transform="translate(16,48)">
      <rect x="0" y="0" width="280" height="38" rx="6" class="chip"/>
      <text x="12" y="24" class="mono">Open file…</text>
    </g>
    <g transform="translate(16,96)">
      <rect x="0" y="0" width="280" height="38" rx="6" class="chip"/>
      <text x="12" y="24" class="mono">Start transcription</text>
    </g>

    <g transform="translate(16,160)">
      <text class="mono" x="0" y="0">Device</text>
      <rect x="0" y="10" width="160" height="34" rx="6" class="chip"/>
      <text x="12" y="32" class="mono">Auto (CUDA)</text>
    </g>
  </g>

  <!-- Center: playback + timeline -->
  <g transform="translate(404,56)">
    <rect x="0" y="0" width="520" height="240" rx="8" fill="#071b1c" stroke="#0b3a33"/>
    <text x="18" y="28" class="mono">Playback (detailed)</text>
    <rect x="18" y="48" width="484" height="140" rx="6" fill="#041618"/>
    <!-- waveform timeline (replaces equalizer) -->
    <g>
      <rect x="18" y="72" width="484" height="72" rx="6" fill="#041618"/>
      <path d="M36 108 C56 84,76 120,96 96 C116 72,136 120,156 88 C176 64,196 120,216 100 C236 80,256 120,276 96 C296 72,316 110,336 100 C356 92,376 120,396 96 C416 72,452 116,502 108" stroke="#0ad688" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <!-- timeline markers -->
    <g fill="#0ad688">
      <rect x="100" y="72" width="2" height="72"/>
      <rect x="240" y="72" width="2" height="72"/>
      <rect x="360" y="72" width="2" height="72"/>
    </g>
    <g transform="translate(18,198)">
      <rect x="0" y="0" width="484" height="28" rx="14" fill="#083b34"/>
      <rect x="0" y="0" width="160" height="28" rx="14" fill="#7ef3b4"/>
    </g>
  </g>

  <!-- Right: transcript + console -->
  <g transform="translate(940,56)">
    <rect x="0" y="0" width="200" height="608" rx="8" fill="#06181a" stroke="#083035"/>
    <text x="18" y="28" class="mono">Console</text>
    <text x="18" y="56" class="muted">[preflight] models/small OK</text>
    <text x="18" y="80" class="muted">[preflight] ffmpeg OK</text>
  </g>

  <!-- Lower transcript panel spanning center+right -->
  <g transform="translate(404,320)">
    <rect x="0" y="0" width="736" height="344" rx="8" fill="#06171a" stroke="#083035"/>
    <text x="18" y="28" class="mono">Transcript</text>
    <g transform="translate(18,52)" class="mono">
      <text y="0">00:00.00 Speaker 1: This UI emphasizes keyboard shortcuts and quick navigation.</text>
      <text y="26">00:04.20 Speaker 2: Press `T` to toggle timestamps, `E` to export.</text>
      <text y="52">00:10.50 Speaker 1: Click a timestamp to seek the playback timeline.</text>
    </g>
  </g>
</svg>